<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learning OS</title>
    <link rel="manifest" href="data/manifest.json">
    <link rel="stylesheet" href="src/ui/styles/main.css">
</head>
<body>
    <div id="app-root">
        <h1 style="text-align: center;">Learning OS</h1>
        <p style="text-align: center;">Initialisation du noyau...</p>
    </div>
    
    <nav id="bottom-nav" style="display: none;">
        <button data-view="dashboard" class="active">🤖 Coach</button>
        <button data-view="planning">📋 Plan</button>
        <button data-view="program">📅 Prog</button>
        <button data-view="journal">📖 Journal</button>
        <button data-view="portfolio">🏆 Portf</button>
    </nav>
    <script>
        window.addEventListener('error', function(e) {
            const root = document.getElementById('app-root');
            if(root) root.innerHTML = '<p style="color:red; padding:20px;">Erreur globale : ' + e.message + '<br>Fichier : ' + e.filename + '</p>';
        });
        window.addEventListener('unhandledrejection', function(e) {
            const root = document.getElementById('app-root');
            if(root) root.innerHTML = '<p style="color:red; padding:20px;">Promesse rejetée : ' + e.reason + '</p>';
        });
    </script>
    <script type="module">
        import { Bootstrap } from './src/core/Bootstrap.js?v=8';
        
        window.addEventListener('DOMContentLoaded', async () => {
            try {
                await Bootstrap.init();
            } catch(e) {
                console.error(e);
                document.getElementById('app-root').innerHTML = '<p style="text-align:center;color:red;">Erreur critique au démarrage.</p>';
            }
        });
    </script>
</body>
</html>
