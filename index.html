<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learning OS</title>
    <link rel="manifest" href="data/manifest.json">
    <style>
        body { background-color: #0f2027; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; }
        nav { background: #1a3644; padding: 10px; display: flex; justify-content: space-around; position: fixed; bottom: 0; width: 100%; border-top: 1px solid #2a5268; z-index: 1000; }
        nav button { background: none; border: none; color: #88a7b7; font-size: 16px; cursor: pointer; padding: 10px; transition: 0.3s; }
        nav button.active { font-weight: bold; border-bottom: 2px solid #00f2fe; color: #00f2fe; }
        #app-root { padding: 20px; padding-bottom: 80px; }
        .stats { background: #1f4051; padding: 15px; border-radius: 8px; margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        button { background: #00f2fe; color: #0f2027; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background: #00d2de; }
        .timer { font-size: 56px; margin: 20px 0; font-weight: bold; color: #00f2fe; }
        .session-list { list-style: none; padding: 0; margin: 0; }
        .session-list li { background: #1f4051; padding: 15px; margin-bottom: 12px; border-radius: 8px; border-left: 5px solid #00f2fe; }
    </style>
</head>
<body>
    <div id="app-root">
        <h1 style="text-align: center;">Learning OS</h1>
        <p style="text-align: center;">Initialisation du noyau...</p>
    </div>
    
    <nav id="bottom-nav" style="display: none;">
        <button id="nav-dash" class="active">🏠 Dash</button>
        <button id="nav-plan">📅 Plan</button>
        <button id="nav-focu">⏱️ Focus</button>
    </nav>

    <script type="module">
        import { Bootstrap } from './src/core/Bootstrap.js';
        
        window.addEventListener('DOMContentLoaded', async () => {
            try {
                const app = await Bootstrap.init();
            } catch(e) {
                console.error(e);
                document.getElementById('app-root').innerHTML = '<p style="text-align:center;color:red;">Erreur critique au démarrage.</p>';
            }
        });
    </script>
</body>
</html>
